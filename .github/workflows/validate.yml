name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: pip install -r requirements-validate.txt

      - name: Comprehensive validation
        run: PYTHONPATH=. python3 scripts/comprehensive_validate.py

      - name: Dataset roundtrip validation
        run: PYTHONPATH=. python3 scripts/validate_datasets.py

      - name: Ciphertext properties validation
        run: PYTHONPATH=. python3 scripts/validate_ciphertext_properties.py

      - name: Math and implementation audit
        run: PYTHONPATH=. python3 scripts/math_audit.py

      - name: Constraint propagator audit
        run: PYTHONPATH=. python3 scripts/constraint_audit.py

      - name: Generate and validate constraint findings
        run: |
          PYTHONPATH=. python3 scripts/generate_constraint_findings.py
          PYTHONPATH=. python3 scripts/validate_constraint_findings.py

      - name: Paranoia audit (paths, invariants, full suite)
        run: PYTHONPATH=. python3 scripts/paranoia_audit.py
